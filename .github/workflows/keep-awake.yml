name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *" # Runs every 10 minutes
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        env:
          RENDER_API_URL: ${{ secrets.RENDER_API_URL }}
        run: |
          if [ -z "$RENDER_API_URL" ]; then
            echo "ERROR: RENDER_API_URL secret is not set."
            echo "Please add RENDER_API_URL to your GitHub repository secrets (Settings -> Secrets and variables -> Actions)."
            exit 1
          fi
          echo "Pinging $RENDER_API_URL/health..."
          curl -f -I "$RENDER_API_URL/health"
